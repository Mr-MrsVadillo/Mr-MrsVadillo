<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Stefa & Juanpa</title>

<link
href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap"
rel="stylesheet">

<style>

@font-face{
font-family:'Easter Onion';
src:url('Easter%20Onion.otf')
format('opentype');
}

@font-face{
font-family:'TIMESS';
src:url('TIMESS__.ttf')
format('truetype');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Montserrat';

overflow:hidden;

background:#000;
}

.cover{

position:relative;

height:100vh;

width:100%;
}

.cover img{

width:100%;

height:100%;

object-fit:cover;

display:block;
}


/* TEXTO SOBRE FRANJA */

.overlay{

position:absolute;

left:50%;

bottom:9%;

transform:translateX(-50%);

width:100%;

max-width:520px;

padding:0 40px;

text-align:center;

color:#E8E2CF;

}


.label{

letter-spacing:4px;

font-size:.9rem;

margin-bottom:14px;

opacity:.9;

}


#nombre{

font-family:'Easter Onion';

font-size:3.1rem;

line-height:1;

margin-bottom:12px;

}


#cupos{

font-family:'TIMESS';

font-size:1.2rem;

margin-bottom:34px;

}


.buttons{

display:flex;

justify-content:center;

gap:14px;

flex-wrap:wrap;

}


.btn{

border:none;

padding:15px 28px;

border-radius:999px;

font-size:1rem;

font-weight:700;

cursor:pointer;

min-width:160px;

transition:.2s;

}


.btn:active{

transform:scale(.97);

}


.sound{

background:#7A843D;

color:white;

}


.continue{

background:white;

color:#103825;

}


@media(max-width:480px){

.overlay{

bottom:10%;

padding:0 25px;

}

#nombre{

font-size:2.2rem;

}

#cupos{

font-size:1rem;

}

.btn{

padding:14px 20px;

font-size:.95rem;

min-width:140px;

}

}

</style>

</head>

<body>

<div class="cover">

<img src="foto-portada.jpg">

<div class="overlay">

<div class="label">

ESTÁN INVITADOS

</div>


<div id="nombre">

Invitado Especial

</div>


<div id="cupos">

Cupo/s: 1

</div>


<div class="buttons">

<button
class="btn sound"
onclick="entrarConMusica()">

🔊 Escuchar

</button>


<button
class="btn continue"
onclick="entrarSinMusica()">

🔇 Continuar

</button>

</div>

</div>

</div>


<audio id="bgMusic">

<source
src="yotetodo.MP3"
type="audio/mpeg">

</audio>



<script>

const token =
new URLSearchParams(
location.search
).get("code");


fetch("invitados.json")

.then(r=>r.json())

.then(data=>{

if(
!token ||
!data[token]
){

document.body.innerHTML=`

<div style="

height:100vh;

display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:22px;

">

Invitación no válida

</div>

`;

return;

}

const invitado =
data[token];

document
.getElementById(
"nombre"
)
.innerText =
invitado.nombre;

document
.getElementById(
"cupos"
)
.innerText =
`Cupo/s: ${invitado.cupos}`;

});



function entrarConMusica(){

const audio =
document
.getElementById(
"bgMusic"
);

audio.volume=.6;

audio.play()

.then(()=>{

sessionStorage.setItem(
"playMusic",
"true"
);

window.location=
`invitacion2.html?code=${token}`;

})

.catch(()=>{

window.location=
`invitacion2.html?code=${token}`;

});

}



function entrarSinMusica(){

sessionStorage.removeItem(
"playMusic"
);

window.location=
`invitacion2.html?code=${token}`;

}

</script>

</body>

</html>
