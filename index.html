<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación | Erick & Stefany</title>
    <style>
        /* ... Tus estilos anteriores ... */

        /* CONTENEDOR DEL VIDEO INICIAL */
        #intro-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999; /* Por encima de todo al principio */
            background-color: #000;
            transition: opacity 1s ease; /* Transición suave al terminar */
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CONTENEDOR DE LA INVITACIÓN (INICIAL.HTML) */
        #main-content {
            opacity: 0; /* Oculto al principio */
            transition: opacity 1.2s ease;
            /* Aquí va el estilo de fondo que simula el final del video */
            background: url('nombres_fondo.jpeg') no-repeat center center fixed;
            background-size: cover;
        }

        /* Clase activa para mostrar la invitación */
        .mostrar-invitacion #main-content {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
        <button class="skip-btn" onclick="mostrarInvitacionDirecto()">Saltar Intro ➔</button>
    </div>

    <div id="main-content">
        </div>

    <script>
        const video = document.getElementById('intro-video');
        const introContainer = document.getElementById('intro-container');

        function transicionAInvitacion() {
            // 1. Desvanecer el video
            introContainer.style.opacity = '0';
            
            // 2. Hacer visible la información de la invitación
            document.body.classList.add('mostrar-invitacion');
            
            // 3. Quitar el contenedor del video por completo después de 1 segundo para que no estorbe
            setTimeout(() => {
                introContainer.style.display = 'none';
            }, 1000);
        }

        // Detectar automáticamente cuando el video llega al final
        video.addEventListener('ended', () => {
            transicionAInvitacion();
        });

        // Botón por si quieren saltarlo
        function mostrarInvitacionDirecto() {
            transicionAInvitacion();
        }
    </script>
</body>
</html>
