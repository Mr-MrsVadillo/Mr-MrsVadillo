<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bienvenidos | Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: 'Cormorant Garamond';
    src: url('CormorantGaramond-VariableFont_wght.ttf') format('truetype');
    /* Al ser una fuente variable, puedes definir el rango de grosores que soporta */
    font-weight: 300 700; 
    font-style: normal;
}


* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfdfb;
    color: #2f3e3a;
    overflow: hidden;
}

/* EL CONTENEDOR HERO AHORA LLEVA LA IMAGEN PARA QUE SE VEA COMPLETA EN WEB Y MÓVIL */
.hero {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    position: relative;
    
    background-image: url('foto 1.jpeg');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
}

/* MÁSCARA DIFUMINADA: Aplica la marca de agua transparente y suaviza toda la pantalla */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    /* Fondo blanco semi-transparente para el efecto marca de agua */
    background: rgba(255, 255, 255, 0.45); 
    z-index: 1;
}

/* CONTENEDOR FLOTANTE SIN BORDES MARCADOS */
.card-wrapper {
    max-width: 500px;
    width: 100%;
    /* Convertimos el padding a unidades de pantalla vh para evitar scrolls */
    padding: 30vh 20px 10vh; 
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* EFECTO DE DIFUMINADO RADIAL DETRÁS DEL TEXTO (Reemplaza los bordes duros de la tarjeta) */
.blur-glow {
    position: absolute;
    width: 120%;
    height: 80%;
    top: 25vh;
    /* Crea un degradado radial ultra suave que se disuelve hacia los lados */
    background: radial-gradient(circle, rgba(255,255,255,0.95) 20%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
    filter: blur(20px); /* Difumina los extremos para que no existan líneas marcadas */
    z-index: -1;
    pointer-events: none;
}

/* ESTILOS DE TEXTO E HIGHLIGHTS */
.label {
    font-family: 'TIMESS', serif !important;
    letter-spacing: 4px;
    font-size: .85rem;
    margin-bottom: 15px;
    color: #2d4d42;
    font-weight: 600;
    text-transform: uppercase;
}

#nombre {
    font-family: 'Cormorant Garamond', serif !important;
    color: #103825;
    font-weight: 600;
    font-size: 2.8rem;
    line-height: 1.2;
    margin-bottom: 10px;
    text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5); /* Mejora lectura sobre fondo claro */
}

#cupos {
    font-family: 'Cormorant Garamond', serif !important;
    color: #103825;
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 40px;
}

/* BOTONES SIMÉTRICOS HORIZONTALES */
.buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    width: 100%;
    max-width: 400px;
}

.btn {
    border: none;
    padding: 14px 20px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    flex: 1;
    transition: all .2s ease;
}

.sound {
    background-color: #103825;
    color: white;
    box-shadow: 0 4px 15px rgba(122, 132, 61, 0.3);
}

.sound:hover {
    background-color: #636b32;
    transform: translateY(-1px);
}

.continue {
    background: rgba(255, 255, 255, 0.9);
    color: #103825;
    border: 1px solid rgba(45, 77, 66, 0.2);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.continue:hover {
    background: #ffffff;
    transform: translateY(-1px);
}

.btn:active {
    transform: scale(.96);
}

/* AJUSTES DE PADDING EN DISPOSITIVOS MÓVILES */
@media (max-width: 480px) {
    .card-wrapper {
        padding-top: 35vh;
    }
    .blur-glow {
        top: 30vh;
        width: 140%;
    }
    #nombre {
        font-size: 2.3rem;
    }
    .btn {
        padding: 12px 15px;
        font-size: 0.7rem;
    }
}
</style>
</head>

<body>

<div class="hero">
    <div class="card-wrapper">
        <div class="blur-glow"></div>
        
        <div id="nombre">Invitado Especial</div>
        <div id="cupos">Cupo/s: 1</div>

        <div class="buttons">
            <button class="btn sound" onclick="entrarConMusica()">
                🔊 Escuchar
            </button>
            <button class="btn continue" onclick="entrarSinMusica()">
                🔇 Continuar
            </button>
        </div>
    </div>
</div>

<audio id="music">
    <source src="yotetodo.MP3" type="audio/mpeg">
</audio>

<script>
const token = new URLSearchParams(location.search).get("code");
let nombreInvitado="";
let cupos=1;

fetch("invitados.json")
.then(r=>r.json())
.then(data=>{
    if(!token || !data[token]){
        document.body.innerHTML=`
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f4f6f4; color:#2d4d42;">
        Invitación no válida
        </div>`;
        return;
    }

    nombreInvitado=data[token].nombre;
    cupos=data[token].cupos;

    document.getElementById("nombre").innerText=nombreInvitado;
    document.getElementById("cupos").innerText=`Cupo/s: ${cupos}`;
});

function entrarConMusica(){
    const audio=document.getElementById("music");
    audio.volume=.6;
    audio.play()
    .then(()=>{
        sessionStorage.setItem("playMusic", "true");
        window.location=`invitacion2.html?code=${token}`;
    })
    .catch(()=>{
        window.location=`invitacion2.html?code=${token}`;
    });
}

function entrarSanMusica(){
    sessionStorage.removeItem("playMusic");
    window.location=`invitacion2.html?code=${token}`;
}
</script>

</body>
</html>
