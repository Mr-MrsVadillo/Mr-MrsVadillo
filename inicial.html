<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
rel="stylesheet">

<style>

@font-face{
    font-family:'Easter Onion';
    src:url('Easter%20Onion.otf') format('opentype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Montserrat';
}

.cover{
    position:relative;
    height:100vh;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENIDO SOBRE LA FRANJA */
.overlay{

    position:absolute;

    left:50%;

    bottom:14%;

    transform:translateX(-50%);

    width:90%;

    text-align:center;

    color:#E8E2CF;
}

.label{
    letter-spacing:4px;
    font-size:.9rem;

    margin-bottom:10px;
}

#nombre{
    font-family:'Easter Onion';

    font-size:3rem;

    margin-bottom:8px;
}

#cupos{

    font-size:1.3rem;

    margin-bottom:35px;
}

.buttons{

    display:flex;

    justify-content:center;

    gap:14px;

    flex-wrap:wrap;
}

.btn{

    border:none;

    padding:16px 28px;

    border-radius:999px;

    font-size:1rem;

    font-weight:700;

    cursor:pointer;

    min-width:150px;
}

.sound{
    background:#7A843D;
    color:white;
}

.continue{
    background:white;
    color:#103825;
}

.btn:active{
    transform:scale(.97);
}

@media(max-width:480px){

#nombre{
    font-size:2.2rem;
}

#cupos{
    font-size:1rem;
}

.overlay{
    bottom:12%;
}

}

</style>
</head>

<body>

<div class="cover">

<img src="foto1.jpeg">

<div class="overlay">

<div class="label">
ESTÁN INVITADOS
</div>

<div id="nombre">
Invitado Especial
</div>

<div id="cupos">
Cupo/s: 1
</div>

<div class="buttons">

<button class="btn sound"
onclick="entrarConMusica()">
🔊 Escuchar
</button>

<button class="btn continue"
onclick="entrarSinMusica()">
🔇 Continuar
</button>

</div>

</div>

</div>


<audio id="music">
<source src="yotetodo.MP3" type="audio/mpeg">
</audio>


<script>

const token =
new URLSearchParams(location.search)
.get("code");

let nombreInvitado="";
let cupos=1;

fetch("invitados.json")
.then(r=>r.json())
.then(data=>{

if(!token || !data[token]){

document.body.innerHTML=`
<div style="
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;">
Invitación no válida
</div>`;

return;

}

nombreInvitado=data[token].nombre;
cupos=data[token].cupos;

document.getElementById("nombre")
.innerText=nombreInvitado;

document.getElementById("cupos")
.innerText=`Cupo/s: ${cupos}`;

});


function entrarConMusica(){

const audio=
document.getElementById("music");

audio.volume=.6;

audio.play()
.then(()=>{

sessionStorage.setItem(
"playMusic",
"true"
);

window.location=
`invitacion2.html?code=${token}`;

});

}


function entrarSinMusica(){

sessionStorage.removeItem(
"playMusic"
);

window.location=
`invitacion2.html?code=${token}`;

}

</script>

</body>
</html>
