<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Stefa & Juanpa</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:'Montserrat',sans-serif;
}

/* FOTO COMPLETA */

.cover{
position:relative;
height:100vh;
}

.cover img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* CONTENIDO SOBRE LA FRANJA */

.overlay{

position:absolute;

left:0;
right:0;

/* AJUSTA ESTE VALOR */
bottom:20vh;

display:flex;

flex-direction:column;

align-items:center;

color:white;

padding:0 30px;

text-align:center;

}

.invite-label{

font-size:14px;

letter-spacing:3px;

opacity:.9;

margin-bottom:10px;

}

#nombre{

font-size:2rem;

font-weight:600;

color:#F4E7D2;

}

#cupos{

margin-top:10px;

font-size:18px;

opacity:.95;

}

/* BOTONES */

.actions{

display:flex;

gap:12px;

margin-top:28px;

}

.btn{

border:none;

padding:14px 20px;

border-radius:999px;

cursor:pointer;

font-size:14px;

font-weight:700;

}

.sound{

background:#7a843d;

color:white;

}

.skip{

background:white;

color:#103825;

}

</style>

</head>

<body>

<div class="cover">

<img src="foto1.jpeg">

<div class="overlay">

<div class="invite-label">
ESTÁN INVITADOS
</div>

<div id="nombre">
Invitado Especial
</div>

<div id="cupos">
Cupo/s: —
</div>

<div class="actions">

<button class="btn sound" id="play">
🔊 Escuchar
</button>

<button class="btn skip" id="skip">
🔇 Continuar
</button>

</div>

</div>

</div>


<audio id="music" loop>
<source src="yotetodo.MP3" type="audio/mpeg">
</audio>


<script>

const token =
new URLSearchParams(location.search)
.get("code");

fetch("invitados.json")
.then(r=>r.json())
.then(data=>{

if(!data[token]) return;

nombre.innerText =
data[token].nombre;

cupos.innerText =
`Cupo/s: ${data[token].cupos}`;

});

const music =
document.getElementById("music");

function entrar(){

location.href =
`invitacion2.html?code=${token}`;

}

play.onclick = async()=>{

try{

music.volume=.6;

await music.play();

setTimeout(
entrar,
800
);

}catch{

entrar();

}

};

skip.onclick=()=>{

entrar();

};

</script>

</body>

</html>
