<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bienvenidos | Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
@font-face{
    font-family:'Easter Onion';
    src:url('Easter%20Onion.otf') format('opentype');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Montserrat', sans-serif;
    background-color: #f4f6f4;
}

/* CONTENEDOR PRINCIPAL QUE MUESTRA LA IMAGEN DE FONDO COMPLETA */
.cover {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center; /* Centrado vertical absoluto */
    justify-content: center; /* Centrado horizontal absoluto */
    padding: 40px 20px; /* Margen de seguridad para pantallas pequeñas */
}

.cover-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover; /* Garantiza que la imagen llene el fondo de manera armoniosa */
    z-index: 1;
}

/* TARJETA BLANCA SLIM (Copiando exactamente las proporciones de la segunda imagen) */
.main-card {
    position: relative;
    z-index: 2;
    max-width: 440px; /* Reducido para imitar el formato estilizado y esbelto */
    width: 100%;
    background: #ffffff; /* Blanco sólido y limpio */
    border-radius: 24px; /* Curvatura suavizada premium */
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1); /* Sombra difuminada idéntica a la referencia */
    
    /* Márgenes internos compactos para equilibrar el espacio del texto */
    padding: 60px 35px; 
    text-align: center;
}

.label {
    letter-spacing: 4px;
    font-size: .8rem;
    margin-bottom: 15px;
    color: #7a843d;
    font-weight: 600;
}

#nombre {
    font-family: 'Easter Onion';
    font-size: 2.8rem; /* Tamaño balanceado para no saturar la tarjeta slim */
    margin-bottom: 8px;
    color: #2d4d42;
    line-height: 1.1;
}

#cupos {
    font-size: 1rem;
    margin-bottom: 40px; /* Espaciado amplio antes de los botones */
    color: #666666;
    font-weight: 400;
}

/* CONTENEDOR DE BOTONES HORIZONTALES */
.buttons {
    display: flex;
    justify-content: center;
    gap: 12px;
}

/* BOTONES REDONDEADOS */
.btn {
    border: none;
    padding: 14px 20px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    flex: 1; /* Hace que ambos botones tengan exactamente el mismo ancho simétrico */
    transition: all .2s ease;
}

.sound {
    background: #7A843D;
    color: white;
    box-shadow: 0 4px 10px rgba(122, 132, 61, 0.2);
}

.sound:hover {
    background: #636b32;
    transform: translateY(-1px);
}

.continue {
    background: #f8f9f8;
    color: #2d4d42;
    border: 1px solid #e2e8e2;
}

.continue:hover {
    background: #eeeeee;
    transform: translateY(-1px);
}

.btn:active {
    transform: scale(.97);
}

/* COMPORTAMIENTO EN MÓVILES (Mantiene las proporciones verticales de la tarjeta) */
@media(max-width:480px){
    .cover {
        padding: 20px 15px;
    }
    .main-card {
        padding: 50px 25px; /* Ajuste sutil para conservar el formato vertical */
    }
    #nombre {
        font-size: 2.4rem;
    }
    .buttons {
        gap: 10px;
    }
    .btn {
        padding: 12px 15px;
        font-size: .75rem;
    }
}
</style>
</head>

<body>

<div class="cover">
    <!-- Tu foto de fondo (foto1.jpeg) se mantendrá completa y proporcionada detrás -->
    <img src="foto 1.jpeg" class="cover-bg">

    <!-- Tarjeta vertical estilizada idéntica a tu segunda referencia -->
    <div class="main-card">
        <div class="label">ESTÁN INVITADOS</div>
        <div id="nombre">Invitado Especial</div>
        <div id="cupos">Cupo/s: 1</div>

        <div class="buttons">
            <button class="btn sound" onclick="entrarConMusica()">
                🔊 Escuchar
            </button>
            <button class="btn continue" onclick="entrarSinMusica()">
                ¼ Continuar
            </button>
        </div>
    </div>
</div>

<audio id="music">
    <source src="yotetodo.MP3" type="audio/mpeg">
</audio>

<script>
const token = new URLSearchParams(location.search).get("code");
let nombreInvitado="";
let cupos=1;

fetch("invitados.json")
.then(r=>r.json())
.then(data=>{
    if(!token || !data[token]){
        document.body.innerHTML=`
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f4f6f4; color:#2d4d42;">
        Invitación no válida
        </div>`;
        return;
    }

    nombreInvitado=data[token].nombre;
    cupos=data[token].cupos;

    document.getElementById("nombre").innerText=nombreInvitado;
    document.getElementById("cupos").innerText=`Cupo/s: ${cupos}`;
});

function entrarConMusica(){
    const audio=document.getElementById("music");
    audio.volume=.6;
    audio.play()
    .then(()=>{
        sessionStorage.setItem("playMusic", "true");
        window.location=`invitacion2.html?code=${token}`;
    })
    .catch(()=>{
        window.location=`invitacion2.html?code=${token}`;
    });
}

function entrarSinMusica(){
    sessionStorage.removeItem("playMusic");
    window.location=`invitacion2.html?code=${token}`;
}
</script>

</body>
</html>
