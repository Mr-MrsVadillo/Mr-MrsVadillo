<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bienvenidos | Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* 1. TIPOGRAFÍAS DE TU INVITACION 2 */
@font-face {
    font-family: 'Easter Onion';
    src: url('Easter%20Onion.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

@font-face {
    font-family: 'TIMESS';
    src: url('TIMESS__.ttf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfdfb;
    color: #2f3e3a;
    overflow-x: hidden;
}

/* 2. ESTRUCTURA HERO COPIADA EXACTAMENTE DE TU INVITACION 2 */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

/* 3. TU CARD RECONFIGURADA: SIN CUADRO BLANCO, MÁRGENES DE INVITACION 2 Y FOTO 1 */
.card {
    max-width: 500px;
    width: 100%;
    border-radius: 20px;
    
    /* Configuración exacta de los paddings superiores e inferiores que me compartiste */
    padding: 250px 40px 160px; 
    
    position: relative;
    overflow: hidden;

    /* REEMPLAZADA POR TU FOTO 1 DE PORTADA */
    background-image: url('foto1.jpeg');
    background-size: cover;
    background-position: top;
    background-color: white;
}

/* Asegura que los textos floten de forma nítida sobre la imagen */
.card > * {
    position: relative;
    z-index: 2;
}

/* 4. ESTILOS DE TEXTO INTEGRADOS CON TU LÓGICA DE FUENTES */
.label {
    font-family: 'TIMESS', serif !important;
    letter-spacing: 4px;
    font-size: .85rem;
    margin-bottom: 15px;
    color: #2d4d42; /* Cambiado a verde oscuro para legibilidad directa sobre la foto */
    font-weight: 600;
    text-transform: uppercase;
}

#nombre {
    font-family: 'Easter Onion', serif !important;
    color: #637c36; /* Tu verde oliva característico de invitacion 2 */
    font-weight: 600;
    font-size: 2.4rem;
    line-height: 1.2;
    margin-bottom: 10px;
}

#cupos {
    font-family: 'TIMESS', serif !important;
    color: #2d4d42;
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 40px;
}

/* 5. CONTENEDOR DE BOTONES HORIZONTALES */
.buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
}

/* BOTONES REDONDEADOS TIPO SUGERIR CANCIÓN */
.btn {
    border: none;
    padding: 14px 20px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    flex: 1; /* Distribución simétrica idéntica */
    transition: all .2s ease;
}

.sound {
    background-color: #7a843d; /* Tu paleta verde oliva */
    color: white;
    box-shadow: 0 4px 10px rgba(122, 132, 61, 0.2);
}

.sound:hover {
    background-color: #636b32;
    transform: translateY(-1px);
}

.continue {
    background: rgba(255, 255, 255, 0.9); /* Un sutil fondo blanco traslúcido para legibilidad */
    color: #2d4d42;
    border: 1px solid #e2e8e2;
}

.continue:hover {
    background: #ffffff;
    transform: translateY(-1px);
}

.btn:active {
    transform: scale(.96);
}

/* RESPONSIVE AJUSTADO */
@media (max-width: 480px) {
    .card {
        padding-top: 220px; /* Reducción leve para que en pantallas chicas no se desplace demasiado */
        padding-left: 20px;
        padding-right: 20px;
    }
    #nombre {
        font-size: 2rem;
    }
    .btn {
        padding: 12px 15px;
        font-size: 0.7rem;
    }
}
</style>
</head>

<body>

<!-- CONTENEDOR GENERAL COPIADO DE INVITACION 2 -->
<div class="hero">
    <div class="card">
        
        <div class="label">ESTÁN INVITADOS</div>
        <div id="nombre">Invitado Especial</div>
        <div id="cupos">Cupo/s: 1</div>

        <div class="buttons">
            <button class="btn sound" onclick="entrarConMusica()">
                🔊 Escuchar
            </button>
            <button class="btn continue" onclick="entrarSinMusica()">
                🔇 Continuar
            </button>
        </div>

    </div>
</div>

<audio id="music">
    <source src="yotetodo.MP3" type="audio/mpeg">
</audio>

<script>
const token = new URLSearchParams(location.search).get("code");
let nombreInvitado="";
let cupos=1;

fetch("invitados.json")
.then(r=>r.json())
.then(data=>{
    if(!token || !data[token]){
        document.body.innerHTML=`
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f4f6f4; color:#2d4d42;">
        Invitación no válida
        </div>`;
        return;
    }

    nombreInvitado=data[token].nombre;
    cupos=data[token].cupos;

    document.getElementById("nombre").innerText=nombreInvitado;
    document.getElementById("cupos").innerText=`Cupo/s: ${cupos}`;
});

function entrarConMusica(){
    const audio=document.getElementById("music");
    audio.volume=.6;
    audio.play()
    .then(()=>{
        sessionStorage.setItem("playMusic", "true");
        window.location=`invitacion2.html?code=${token}`;
    })
    .catch(()=>{
        window.location=`invitacion2.html?code=${token}`;
    });
}

function entrarSinMusica(){
    sessionStorage.removeItem("playMusic");
    window.location=`invitacion2.html?code=${token}`;
}
</script>

</body>
</html>
