<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos | Mr&MrsVadillo</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #103825; /* Verde bosque profundo de fondo por si tarda en cargar */
            overflow: hidden;
        }

        /* CONTENEDOR DEL VIDEO EN PANTALLA COMPLETA */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura que el video llene toda la pantalla del celular sin deformarse */
        }

        /* BOTÓN SUTIL PARA SALTAR INTRO */
        .skip-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: rgba(16, 56, 37, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            padding: 8px 16px;
            font-size: 10px;
            font-family: sans-serif;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            z-index: 10;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .skip-btn:hover {
            background: rgba(16, 56, 37, 0.9);
            border-color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="intro-video" autoplay muted playsinline>
            <source src="sobre con foto.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>
    </div>

    <button class="skip-btn" onclick="avanzarInvitacion()">Saltar Intro ➔</button>

    <script>
        // Capturamos el código token de la URL (ej: ?code=S2XQ9M)
        const token = new URLSearchParams(window.location.search).get("code");
        const video = document.getElementById("intro-video");

        // Lógica para redirigir llevando el token correspondiente
        function avanzarInvitacion() {
            if (token) {
                window.location.href = `inicial.html?code=${token}`;
            } else {
                window.location.href = `inicial.html`;
            }
        }

        // CONTROL AUTOMÁTICO: Cuando el video llega a su fin, salta solo a la siguiente pantalla
        video.addEventListener('ended', () => {
            avanzarInvitacion();
        });

        // Respaldo de seguridad: Si por alguna razón el video falla o no carga en 8 segundos, avanza solo
        setTimeout(() => {
            avanzarInvitacion();
        }, 8000); 
    </script>

</body>
</html>
