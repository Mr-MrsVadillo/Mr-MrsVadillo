<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bienvenidos | Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
@font-face {
    font-family: 'Cormorant Garamond';
    src: url('CormorantGaramond-VariableFont_wght.ttf') format('truetype');
    font-weight: 300 700; 
    font-style: normal;
}

/* ELIMINACIÓN DE SCROLLS LATERALES */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    background: #fdfdfb;
    color: #2f3e3a;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdfdfb;
    color: #2f3e3a;
    overflow: hidden;
}

/* CONTENEDOR HERO CON LA IMAGEN COMPLETA */
.hero {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    position: relative;
    
    background-image: url('foto 1.jpeg');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
}

/* MÁSCARA DIFUMINADA: Marca de agua transparente */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.45); 
    z-index: 1;
}

/* CONTENEDOR FLOTANTE SIN BORDES MARCADOS */
.card-wrapper {
    max-width: 500px;
    width: 100%;
    padding: 30vh 20px 10vh; 
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* EFECTO DE DIFUMINADO RADIAL DETRÁS DEL TEXTO */
.blur-glow {
    position: absolute;
    width: 120%;
    height: 80%;
    top: 25vh;
    background: radial-gradient(circle, rgba(255,255,255,0.95) 20%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
    filter: blur(20px); 
    z-index: -1;
    pointer-events: none;
}

/* ESTILOS DE TEXTO E HIGHLIGHTS */
.label {
    font-family: 'Cormorant Garamond', serif !important;
    letter-spacing: 4px;
    font-size: .85rem;
    margin-bottom: 15px;
    color: #103825;
    font-weight: 600;
    text-transform: uppercase;
}

#nombre {
    font-family: 'Cormorant Garamond', serif !important;
    color: #103825;
    font-weight: 600;
    font-size: 2.8rem;
    line-height: 1.2;
    margin-bottom: 10px;
    text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5); 
}

#cupos {
    font-family: 'Cormorant Garamond', serif !important;
    color: #103825;
    font-weight: bold;
    font-size: 1.1rem;
    margin-bottom: 40px;
}

/* BOTONES SIMÉTRICOS HORIZONTALES CON ESTILO RETO RPG / ZELDA */
.buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    width: 100%;
    max-width: 440px;
}

.btn {
    border: 4px solid #d4af37; /* Borde dorado clásico de Trifuerza */
    background: #103825; /* Verde bosque profundo */
    color: #d4af37; /* Texto dorado */
    padding: 14px 10px;
    font-size: 8px; /* Tamaño pixel art ideal para la fuente */
    font-family: 'Press Start 2P', monospace;
    text-transform: uppercase;
    cursor: pointer;
    flex: 1;
    border-radius: 4px;
    image-rendering: pixelated;
    /* Efecto relieve 3D retro */
    box-shadow: 0 5px 0px #082216, inset -2px -2px 0px #082216, inset 2px 2px 0px #1c5c32;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

/* Variación de color alternativa para el botón "Siguiente" si quieres diferenciarlo, o mantener ambos iguales */
.continue {
    background: #1a4c35; 
    box-shadow: 0 5px 0px #082216, inset -2px -2px 0px #082216, inset 2px 2px 0px #2a6f44;
}

.btn:hover {
    filter: brightness(1.1);
}

/* Efecto mecánico al presionar el botón (se hunde como un botón real) */
.btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0px #082216, inset -1px -1px 0px #082216, inset 1px 1px 0px #1c5c32;
}

/* AJUSTES DE PADDING EN DISPOSITIVOS MÓVILES */
@media (max-width: 480px) {
    .card-wrapper {
        padding-top: 35vh;
    }
    .blur-glow {
        top: 30vh;
        width: 140%;
    }
    #nombre {
        font-size: 2.3rem;
    }
    .buttons {
        gap: 10px;
    }
    .btn {
        padding: 12px 6px;
        font-size: 7px;
    }
}
</style>
</head>

<body>

<div class="hero">
    <div class="card-wrapper">
        <div class="blur-glow"></div>
        
        <div id="nombre">Invitado Especial</div>
        <div id="cupos">Cupo/s: 1</div>

        <div class="buttons">
            <button class="btn sound" onclick="entrarConMusica()">
                🔊 MELODÍA
            </button>
            <button class="btn continue" onclick="entrarSinMusica()">
                🔇 SIGUIENTE
            </button>
        </div>
    </div>
</div>

<audio id="music">
    <source src="zelda.mp3" type="audio/mp3">
</audio>

<script>
const token = new URLSearchParams(location.search).get("code");
let nombreInvitado = "";
let cupos = 1;

fetch("invitados.json")
.then(r => r.json())
.then(data => {
    if (!token || !data[token]) {
        document.body.innerHTML = `
        <div style="height:100vh; display:flex; align-items:center; justify-content:center; font-size:22px; background:#f4f6f4; color:#2d4d42;">
        Invitación no válida
        </div>`;
        return;
    }

    nombreInvitado = data[token].nombre;
    cupos = data[token].cupos;

    document.getElementById("nombre").innerText = nombreInvitado;
    document.getElementById("cupos").innerText = `Cupo/s: ${cupos}`;
});

function entrarConMusica() {
    const audio = document.getElementById("music");
    audio.volume = 0.6;

    // Guardamos la intención de reproducir antes de intentar el play
    sessionStorage.setItem("playMusic", "true");

    audio.play()
    .then(() => {
        window.location.href = `invitacion2.html?code=${token}`;
    })
    .catch((error) => {
        console.log("Autoplay bloqueado, redirigiendo igual:", error);
        window.location.href = `invitacion2.html?code=${token}`;
    });
}

function entrarSinMusica() {
    sessionStorage.removeItem("playMusic");
    window.location.href = `invitacion2.html?code=${token}`;
}
</script>

</body>
</html>
